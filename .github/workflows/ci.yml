name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test ./... -v -race

    - name: Run vet
      run: go vet ./...

    - name: Run fmt check
      run: |
        gofmt -l .
        if [ -n "$(gofmt -l .)" ]; then
          echo "Code needs formatting. Run 'gofmt -w .'"
          exit 1
        fi

    - name: Build
      run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Run golint
      run: go install golang.org/x/lint/golint@latest && golint -set_exit_status ./...

    - name: Run staticcheck
      run: go install honnef.co/go/tools/cmd/staticcheck@latest && staticcheck ./...